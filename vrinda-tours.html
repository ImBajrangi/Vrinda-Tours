                                showToast(d.name + ' • ' + (status === 'available' ? 'Available' : 'On a ride'), 'success');
                            });
                            driverMapMarkers[d.id] = marker;
                        }
                    } else {
                        // Remove offline driver markers
                        if (driverMapMarkers[d.id]) {
                            map.removeLayer(driverMapMarkers[d.id]);
                            delete driverMapMarkers[d.id];
                        }
                    }
                });
            }

            // ========================================
            //  RIDE BOOKING FLOW
            // ========================================
            if (bookRideBtn) bookRideBtn.addEventListener('click', function () {
                if (!activeMarker) return;
                openRideSheet();
            });

            function openRideSheet() {
                var drivers = getDriversCache().filter(function (d) {
                    return d.status === 'available' && d.location && d.location.lat;
                });

                if (drivers.length === 0) {
                    rideSheetBody.innerHTML = '<div class="ride-sheet-empty">' +
                        '<p>No drivers available right now</p>' +
                        '<span style="color:#999;font-size:0.75rem;margin-top:0.5rem;display:block;">Please try again in a few minutes</span>' +
                        '</div>';
                } else {
                    // Sort by distance from user (or from destination)
                    var refLat = userLocation ? userLocation.lat : (activeMarker ? activeMarker.locationData.lat : 27.64);
                    var refLng = userLocation ? userLocation.lng : (activeMarker ? activeMarker.locationData.lng : 77.38);

                    drivers.forEach(function (d) {
                        d._distance = calculateDistance(refLat, refLng, d.location.lat, d.location.lng);
                        d._eta = calculateETA(d._distance);
                    });
                    drivers.sort(function (a, b) { return a._distance - b._distance; });

                    rideSheetBody.innerHTML = drivers.map(function (d) {
                        var initials = d.name.split(' ').map(function (w) { return w[0]; }).join('').slice(0, 2).toUpperCase();
                        var avatar = d.photo
                            ? '<img src="' + d.photo + '" alt="' + d.name + '">'
                            : initials;

                        return '<div class="ride-driver-card" data-driver-id="' + d.id + '">' +
                            '<div class="rd-avatar">' + avatar + '</div>' +
                            '<div class="rd-info">' +
                            '<h4>' + d.name + '</h4>' +
                            '<div class="rd-eta">' + formatDistance(d._distance) + ' away • ETA ' + d._eta + '</div>' +
                            '</div>' +
                            '<button class="rd-select-btn" onclick="UberModule.requestRide(\'' + d.id + '\')">Select</button>' +
                            '</div>';
                    }).join('');
                }

                rideSheetOverlay.classList.add('visible');
                rideSheet.classList.add('visible');
                if (window.lucide) window.lucide.createIcons();
            }

            function closeRideSheetFn() {
                rideSheetOverlay.classList.remove('visible');
                rideSheet.classList.remove('visible');
            }

            if (closeRideSheet) closeRideSheet.addEventListener('click', closeRideSheetFn);
            if (rideSheetOverlay) rideSheetOverlay.addEventListener('click', closeRideSheetFn);

            // ========================================
            //  REQUEST RIDE + WHATSAPP
            // ========================================
            function requestRide(driverId) {
                closeRideSheetFn();
                var driver = getDriversCache().find(function (d) { return d.id === driverId; });
                if (!driver) { showToast('Driver not found', 'error'); return; }

                var dest = activeMarker ? activeMarker.locationData : null;
                if (!dest) { showToast('Select a destination first', 'error'); return; }

                var rideData = {
                    pickupLat: userLocation ? userLocation.lat : 27.646,
                    pickupLng: userLocation ? userLocation.lng : 77.377,
                    pickupName: userLocation ? 'Your Location' : 'Barsana Center',
                    destName: dest.name,
                    destDesc: dest.description,
                    destLat: dest.lat,
                    destLng: dest.lng,
                    status: 'requested',
                    timestamp: Date.now()
                };

                activeRideDriverId = driverId;

                // Push ride request to Firebase
                if (useFirebase && AS && AS.firestore) {
                    AS.fsUpdate(AS.fsDoc(DRIVERS_PATH, driverId), { currentRide: rideData }).then(function () {
                        showRideStatusBanner('waiting', 'Waiting for ' + driver.name + ' to accept...');
                        listenForRideStatus(driverId, driver);
                    }).catch(function () {
                        showToast('Could not send request. Try again.', 'error');
                    });
                } else {
                    // Fallback: just open WhatsApp directly
                    sendWhatsApp(driver, dest);
                    showToast('Opening WhatsApp to contact ' + driver.name, 'success');
                }
            }

            function listenForRideStatus(driverId, driver) {
                if (!AS || !AS.firestore) return;
                var rideRef = AS.fsDoc(DRIVERS_PATH, driverId);
                rideStatusListener = AS.fsOnSnapshot(rideRef, function (snap) {
                    var data = snap.data(); var status = data && data.currentRide ? data.currentRide.status : null;
                    if (status === 'accepted') {
                        showRideStatusBanner('accepted', driver.name + ' accepted your ride! 🎉');
                        var dest = activeMarker ? activeMarker.locationData : null;
                        sendWhatsApp(driver, dest);
                        // Draw route from driver to user
                        var driverLoc = driver.location;
                        if (driverLoc && userLocation) {
                            drawRoute({ lat: driverLoc.lat, lng: driverLoc.lng });
                        }
                    } else if (status === 'completed' || status === null) {
                        hideRideStatusBanner();
                    }
                });
            }

            function sendWhatsApp(driver, dest) {
                var phone = (driver.phone || '').replace(/[^0-9]/g, '');
                if (phone.startsWith('0')) phone = '91' + phone.slice(1);
                if (!phone.startsWith('91') && phone.length === 10) phone = '91' + phone;

                var msg = '🙏 *Vrinda Tours Ride Request*\n\n';
                msg += '📍 *Pickup*: ' + (userLocation ? 'Maps: https://maps.google.com/?q=' + userLocation.lat + ',' + userLocation.lng : 'Barsana Center') + '\n';
                if (dest) msg += '🏁 *Destination*: ' + dest.name + '\n';
                msg += '\nPlease confirm if you can pick me up. 🙏';

                var url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
                window.open(url, '_blank');
            }

            function showRideStatusBanner(type, text) {
                rideStatusBanner.className = 'ride-status-banner visible ' + type;
                rideStatusText.textContent = text;
            }

            function hideRideStatusBanner() {
                rideStatusBanner.classList.remove('visible');
                activeRideDriverId = null;
            }

            if (cancelRideBtn) cancelRideBtn.addEventListener('click', function () {
                if (activeRideDriverId && useFirebase && AS && AS.firestore) {
                    AS.fsUpdate(AS.fsDoc(DRIVERS_PATH, activeRideDriverId), { currentRide: null });
                }
                hideRideStatusBanner();
                showToast('Ride cancelled', 'error');
            });

            // ========================================
            //  DRIVERS PANEL (existing logic, updated)
            // ========================================
            function openPanel() {
                updateAdminUI();
                renderDrivers(getDriversCache());
                driversOverlay.classList.add('visible');
                driversPanel.classList.add('visible');
                document.body.style.overflow = 'hidden';
                if (window.lucide) window.lucide.createIcons();
            }

            function closePanel() {
                driversOverlay.classList.remove('visible');
                driversPanel.classList.remove('visible');
                document.body.style.overflow = '';
            }

            if (driversPill) driversPill.addEventListener('click', function (e) {
                e.stopPropagation();
                openPanel();
            });
            if (closePanelBtn) closePanelBtn.addEventListener('click', closePanel);
            if (driversOverlay) driversOverlay.addEventListener('click', closePanel);

            // ---- Modal Toggle ----
            function openModal() {
                if (!isAdmin) { showToast('Admin access required. Double-click Drivers pill to login.', 'error'); return; }
                addModal.classList.add('visible');
                resetForm();
            }
            function closeModal() { addModal.classList.remove('visible'); resetForm(); }

            if (openAddBtn) openAddBtn.addEventListener('click', openModal);
            if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
            if (addModalBg) addModalBg.addEventListener('click', closeModal);

            // ---- Photo Upload ----
            if (photoPreview) photoPreview.addEventListener('click', function () { photoInput.click(); });
            if (photoInput) photoInput.addEventListener('change', function (e) {
                var file = e.target.files[0]; if (!file) return;
                var reader = new FileReader();
                reader.onload = function (ev) {
                    var img = new Image(); img.onload = function () {
                        var canvas = document.createElement('canvas');
                        var MAX = 140; var w = img.width, h = img.height;
                        if (w > h) { h = h * MAX / w; w = MAX; } else { w = w * MAX / h; h = MAX; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.55);
                        photoPreview.innerHTML = '<img src="' + currentPhotoBase64 + '" alt="Driver">';
                    }; img.src = ev.target.result;
                }; reader.readAsDataURL(file);
            });

            // ---- Form Validation & Submit ----
            function resetForm() {
                if (addForm) addForm.reset(); currentPhotoBase64 = '';
                if (photoPreview) photoPreview.innerHTML = '<div class="photo-placeholder"><i data-lucide="camera" style="width:24px;height:24px;"></i><span>Photo</span></div>';
                if (nameError) nameError.classList.remove('visible');
                if (phoneError) phoneError.classList.remove('visible');
                if (nameInput) nameInput.classList.remove('input-error');
                if (phoneInput) phoneInput.classList.remove('input-error');
                if (window.lucide) window.lucide.createIcons();
            }

            if (addForm) addForm.addEventListener('submit', function (e) {
                e.preventDefault(); if (!isAdmin) return;
                var valid = true;
                var name = nameInput.value.trim(); var phone = phoneInput.value.trim();
                if (!name) { nameInput.classList.add('input-error'); nameError.classList.add('visible'); valid = false; }
                if (!phone || phone.length < 10) { phoneInput.classList.add('input-error'); phoneError.classList.add('visible'); valid = false; }
                if (!valid) return;

                var submitBtn = document.getElementById('form-submit-btn');
                submitBtn.disabled = true; submitBtn.textContent = 'Saving...';

                var driverData = {
                    name: name, phone: phone,
                    email: emailInput.value.trim() || '',
                    photo: currentPhotoBase64,
                    status: 'offline',
                    createdAt: new Date().toISOString()
                };

                function saveLocally() {
                    var localDrivers = getDriversCache();
                    localDrivers.unshift(Object.assign({ id: 'local_' + Date.now() }, driverData));
                    setDriversCache(localDrivers);
                    closeModal(); showToast(name + ' added (locally)', 'success');
                }

                if (useFirebase && AS && AS.firestore) {
                    AS.fsAdd(AS.fsCollection(DRIVERS_PATH), driverData).then(function () {
                        closeModal(); showToast(name + ' added successfully', 'success');
                    }).catch(function () { useFirebase = false; saveLocally(); })
                        .finally(function () {
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = '<i data-lucide="user-check" style="width:18px;height:18px;"></i> Save Driver';
                            if (window.lucide) window.lucide.createIcons();
                        });
                } else {
                    saveLocally(); submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i data-lucide="user-check" style="width:18px;height:18px;"></i> Save Driver';
                    if (window.lucide) window.lucide.createIcons();
                }
            });

            // ---- Render Drivers List ----
            function renderDrivers(drivers) {
                if (driverCountEl) driverCountEl.textContent = drivers.length;
                if (!driversList) return;

                if (drivers.length === 0) {
                    driversList.innerHTML = '<div class="drivers-empty">' +
                        '<i data-lucide="users" style="width:48px;height:48px;"></i>' +
                        '<p>No drivers yet</p>' +
                        '<span>' + (isAdmin ? 'Add your first driver to get started' : 'Currently no drivers available') + '</span>' +
                        '</div>';
                    if (window.lucide) window.lucide.createIcons();
                    return;
                }

                driversList.innerHTML = drivers.map(function (d) {
                    var initials = d.name.split(' ').map(function (w) { return w[0]; }).join('').slice(0, 2).toUpperCase();
                    var avatar = d.photo ? '<img src="' + d.photo + '" alt="' + d.name + '">' : initials;
                    var emailLine = d.email ? '<div class="driver-email">' + d.email + '</div>' : '';
                    var statusBadge = d.status === 'available' ? ' <span style="color:#22C55E;font-size:0.6rem;">● Online</span>'
                        : d.status === 'busy' ? ' <span style="color:#F59E0B;font-size:0.6rem;">● Busy</span>'
                            : ' <span style="color:#999;font-size:0.6rem;">● Offline</span>';
                    var deleteBtn = isAdmin
                        ? '<button class="driver-action-btn delete-btn" title="Remove" onclick="UberModule.confirmDelete(\'' + d.id + '\')"><i data-lucide="trash-2" style="width:16px;height:16px;"></i></button>'
                        : '';

                    return '<div class="driver-card" data-id="' + d.id + '">' +
                        '<div class="driver-avatar" style="background:' + (d.photo ? 'none' : '#F3F4F6') + '">' + avatar + '</div>' +
                        '<div class="driver-details">' +
                        '<h4>' + d.name + statusBadge + '</h4>' +
                        '<div class="driver-phone"><i data-lucide="phone" style="width:12px;height:12px;"></i> ' + d.phone + '</div>' +
                        emailLine +
                        '</div>' +
                        '<div class="driver-actions">' +
                        '<button class="driver-action-btn call-btn" title="Call" onclick="window.open(\'tel:' + d.phone + '\')"><i data-lucide="phone" style="width:16px;height:16px;"></i></button>' +
                        deleteBtn +
                        '</div>' +
                        '<div class="delete-confirm" id="del-' + d.id + '">' +
                        '<span>Remove?</span>' +
                        '<button class="confirm-yes" onclick="UberModule.deleteDriver(\'' + d.id + '\')">Yes</button>' +
                        '<button class="confirm-no" onclick="document.getElementById(\'del-' + d.id + '\').classList.remove(\'visible\')">No</button>' +
                        '</div>' +
                        '</div>';
                }).join('');
                if (window.lucide) window.lucide.createIcons();
            }

            // ---- Delete ----
            function confirmDelete(id) { if (!isAdmin) return; var el = document.getElementById('del-' + id); if (el) el.classList.add('visible'); }
            function deleteDriver(id) {
                if (!isAdmin) return;
                function removeLocally() {
                    setDriversCache(getDriversCache().filter(function (d) { return d.id !== id; }));
                    showToast('Driver removed', 'success');
                }
                // Remove map marker
                if (driverMapMarkers[id]) { map.removeLayer(driverMapMarkers[id]); delete driverMapMarkers[id]; }

                if (useFirebase && AS && AS.firestore && !id.startsWith('local_')) {
                    AS.fsDelete(AS.fsDoc(DRIVERS_PATH, id)).then(function () {
                        showToast('Driver removed from cloud', 'success');
                    }).catch(function () { removeLocally(); });
                } else { removeLocally(); }
            }

            // Expose globally
            window.UberModule = { confirmDelete: confirmDelete, deleteDriver: deleteDriver, requestRide: requestRide };

            // ========================================
            //  PROFILE MARKER FIX
            // ========================================
            // Fix: the user-location-marker uses iconAnchor [20,40] which
            // misaligns on some zoom levels. Correct to pin-tip: [20,38]
            // This is applied in getCurrentLocation() which was already defined above.
            // We monkey-patch it here:
            var _origGetLocation = getCurrentLocation;
            getCurrentLocation = function () {
                _origGetLocation();
                // After a short delay, fix the anchor if marker exists
                setTimeout(function () {
                    if (userMarker) {
                        var fixedIcon = L.divIcon({
                            className: 'user-location-marker',
                            html: '',
                            iconSize: [40, 40],
                            iconAnchor: [20, 38],
                            popupAnchor: [0, -38]
                        });
                        userMarker.setIcon(fixedIcon);
                    }
                }, 500);
            };

            // ========================================
            //  INITIALIZE
            // ========================================
            updateAdminUI();
            renderDrivers(getDriversCache());

            function initWhenReady() {
                if (window.AuthService && window.AuthService.firestore) {
                    initFirebaseSync();
                    AS.onAuthStateChange(function(event, user) { checkFirebaseAdmin(user); });
                } else {
                    setTimeout(initWhenReady, 500);
                }
            }
            setTimeout(initWhenReady, 300);
        })();
    </script>
</body>

</html>
